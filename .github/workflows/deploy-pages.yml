name: Deploy to GitHub Pages

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: 'pages'
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v2
              with:
                  version: latest

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '22'

            - name: Install dependencies
              run: pnpm install --no-frozen-lockfile

            - name: Prepare SvelteKit
              run: pnpm run prepare

            - name: Create .env for CI
              run: |
                  cat > .env <<EOF
                  BRAND_NAME=${{ vars.PUBLIC_BRAND_NAME }}
                  SYSTEM_URL=${{ vars.PUBLIC_SYSTEM_URL }}
                  COMPANY_NAME=${{ vars.PUBLIC_COMPANY_NAME }}
                  EOF

            - name: Load env vars from .env
              run: |
                  set -a
                  source .env
                  set +a
                  echo "PUBLIC_BRAND_NAME=$BRAND_NAME" >> "$GITHUB_ENV"
                  echo "PUBLIC_SYSTEM_URL=$SYSTEM_URL" >> "$GITHUB_ENV"
                  echo "PUBLIC_COMPANY_NAME=$COMPANY_NAME" >> "$GITHUB_ENV"

            - name: Generate config.js for GitHub Pages
              run: node scripts/generate-config.mjs
              env:
                  GITHUB_ACTIONS: true
                  PUBLIC_BRAND_NAME: ${{ env.PUBLIC_BRAND_NAME }}
                  PUBLIC_SYSTEM_URL: ${{ env.PUBLIC_SYSTEM_URL }}
                  PUBLIC_COMPANY_NAME: ${{ env.PUBLIC_COMPANY_NAME }}

            - name: Build
              run: pnpm run build
              env:
                  NODE_ENV: production

            - name: Setup Pages
              uses: actions/configure-pages@v4

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: 'build'

    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
